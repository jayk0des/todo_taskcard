<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Todo Task Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title">
      <div class="card-view" id="todo-view">
        <header class="todo-header">
          <h2 id="todo-title" data-testid="test-todo-title"></h2>

          <div class="priority-wrap">
            <span class="priority-indicator" data-testid="test-todo-priority-indicator" aria-hidden="true"></span>
            <span class="badge priority" data-testid="test-todo-priority" aria-label="Task priority"></span>
          </div>
        </header>

        <div
          id="todo-collapsible-section"
          class="todo-collapsible is-collapsed"
          data-testid="test-todo-collapsible-section"
        >
          <p class="todo-description" data-testid="test-todo-description"></p>
        </div>

        <div class="todo-meta">
          <time id="due-date" class="meta-chip" data-testid="test-todo-due-date"></time>
          <time
            id="time-remaining"
            class="meta-chip"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
          ></time>
          <span
            id="overdue-indicator"
            class="badge overdue hidden"
            data-testid="test-todo-overdue-indicator"
            aria-label="Task overdue indicator"
          >
            Overdue
          </span>
        </div>

        <div class="controls-row">
          <div class="toggle-wrap">
            <input
              id="complete-toggle"
              type="checkbox"
              data-testid="test-todo-complete-toggle"
            />
            <label for="complete-toggle">Mark as completed</label>
          </div>

          <div class="status-control-wrap">
            <label for="status-control">Status</label>
            <select
              id="status-control"
              data-testid="test-todo-status-control"
              aria-label="Task status"
            >
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>

          <span
            id="status-badge"
            class="badge status pending"
            data-testid="test-todo-status"
            aria-label="Status: Pending"
          >
            Pending
          </span>
        </div>

        <button
          type="button"
          class="link-button"
          id="expand-toggle"
          data-testid="test-todo-expand-toggle"
          aria-expanded="false"
          aria-controls="todo-collapsible-section"
        >
          Show more
        </button>

        <ul class="todo-tags" role="list" data-testid="test-todo-tags" aria-label="Task tags">
          <li class="tag" data-testid="test-todo-tag-work">work</li>
          <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
          <li class="tag">design</li>
        </ul>

        <div class="action-buttons">
          <button type="button" id="edit-button" data-testid="test-todo-edit-button">Edit</button>
          <button type="button" data-testid="test-todo-delete-button">Delete</button>
        </div>
      </div>

      <form class="edit-form hidden" data-testid="test-todo-edit-form" id="todo-edit-form">
        <div class="form-field">
          <label for="edit-title">Title</label>
          <input id="edit-title" data-testid="test-todo-edit-title-input" type="text" required />
        </div>

        <div class="form-field">
          <label for="edit-description">Description</label>
          <textarea
            id="edit-description"
            data-testid="test-todo-edit-description-input"
            rows="5"
            required
          ></textarea>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority" data-testid="test-todo-edit-priority-select">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <div class="form-field">
            <label for="edit-due-date">Due date</label>
            <input
              id="edit-due-date"
              data-testid="test-todo-edit-due-date-input"
              type="datetime-local"
              required
            />
          </div>
        </div>

        <div class="action-buttons">
          <button type="submit" data-testid="test-todo-save-button">Save</button>
          <button type="button" id="cancel-button" data-testid="test-todo-cancel-button">Cancel</button>
        </div>
      </form>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
