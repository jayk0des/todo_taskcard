<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Task Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title">
      <header class="todo-header">
        <h2 id="todo-title" data-testid="test-todo-title">Ship Stage 0 Todo Card</h2>
        <span class="badge priority high" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
      </header>

      <p class="todo-description" data-testid="test-todo-description">
        Here is a clean, accessible and responsive task card with test IDs, semantic HTML, and keyboard-friendly interactions.
      </p>

      <div class="todo-meta">
        <time id="due-date" class="meta-chip" data-testid="test-todo-due-date"></time>
        <time id="time-remaining" class="meta-chip" data-testid="test-todo-time-remaining" aria-live="polite"></time>
        <span id="status-badge" class="badge status pending" data-testid="test-todo-status" aria-label="Status: Pending">Pending</span>
      </div>

      <ul class="todo-tags" role="list" data-testid="test-todo-tags" aria-label="Task tags">
        <li class="tag" data-testid="test-todo-tag-work">work</li>
        <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
        <li class="tag">design</li>
      </ul>

      <div class="todo-actions-row">
        <div class="toggle-wrap">
          <input id="complete-toggle" type="checkbox" data-testid="test-todo-complete-toggle" />
          <label for="complete-toggle">Mark as completed</label>
        </div>

        <div class="action-buttons">
          <button type="button" data-testid="test-todo-edit-button" aria-label="Edit task">Edit</button>
          <button type="button" data-testid="test-todo-delete-button" aria-label="Delete task">Delete</button>
        </div>
      </div>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
